<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>{{{ PRODUCT_NAME }}}</title>
        <link rel="preconnect" href="https://bridge.playgama.com">
        <link rel="preload" href="Build/{{{ CODE_FILENAME }}}" as="fetch" type="application/wasm" crossorigin>
        <link rel="preload" href="Build/{{{ DATA_FILENAME }}}" as="fetch" crossorigin>
        <link rel="preload" href="Build/{{{ FRAMEWORK_FILENAME }}}" as="script">
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
            }
            .fullscreen-canvas {
                background: #242424;
                width: 100%;
                height: 100%;
                max-width: calc(100vh * (16 / 9));
                max-height: calc(100vw * (9 / 16));
            }
            body {
                background-color: #000000; /* Black bars color */
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas" class="fullscreen-canvas"></canvas>
        <script src="./playgama-bridge-unity.js"></script>
    </body>
</html>
